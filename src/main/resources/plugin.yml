name: CombatLog
version: ${project.version}
main: de.nikey.combatLog.CombatLog
api-version: 1.21
authors: [ Nikey ]
website: https://github.com/NikeyV1
softdepend:
  - WorldGuard

commands:
  combatlog:
    description: Main CombatLog command
    usage: /<command> [reload|status|clear]
    permission: combatlog.use

permissions:
  combatlog.use:
    description: Allows using CombatLog commands
    default: op
  combatlog.reload:
    description: Allows reloading CombatLog config
    default: op
  combatlog.status:
    description: Allows checking your own combat status
    default: op
  combatlog.status.others:
    description: Allows checking other players' combat status
    default: op
  combatlog.clear:
    description: Allows clearing combat tags
    default: op
